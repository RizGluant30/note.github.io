<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notation Manga / Anime</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.15);
      --text: #f0ece4;
      --text-muted: #8a8580;
      --text-faint: #4a4742;
      --accent: #e8c96a;
      --accent-dim: rgba(232,201,106,0.12);
      --accent-border: rgba(232,201,106,0.35);
      --red: #e05c5c;
      --red-dim: rgba(224,92,92,0.12);
      --green: #5cb88a;
      --green-dim: rgba(92,184,138,0.12);
      --blue: #6aaae8;
      --blue-dim: rgba(106,170,232,0.12);
      --orange: #e0935c;
      --orange-dim: rgba(224,147,92,0.12);
    }

    html { background: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; min-height: 100vh; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 4rem;
      background:
        radial-gradient(ellipse 80% 40% at 20% 0%, rgba(232,201,106,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(106,170,232,0.04) 0%, transparent 60%),
        var(--bg);
    }

    .container { width: 100%; max-width: 640px; }

    /* HEADER */
    .site-header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.5s ease both;
    }

    .site-header .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    .site-header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .site-header .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    /* TYPE TOGGLE */
    .type-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px;
      width: fit-content;
      margin: 0 auto 2rem;
    }

    .type-btn {
      padding: 8px 28px;
      border-radius: 999px;
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text-muted);
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.04em;
      transition: color 0.2s, background 0.2s;
    }
    .type-btn.active {
      background: var(--accent);
      color: #0d0d0d;
    }

    /* TITLE INPUT */
    .title-wrap {
      margin-bottom: 1.75rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }
    .field-label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 700;
    }
    .title-input {
      width: 100%;
      font-size: 20px;
      font-weight: 300;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-hover);
      color: var(--text);
      padding: 6px 0 10px;
      outline: none;
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.02em;
      transition: border-color 0.2s;
    }
    .title-input:focus { border-bottom-color: var(--accent); }
    .title-input::placeholder { color: var(--text-faint); }

    /* CRITERIA */
    .criteria-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .criterion-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px 14px;
      transition: border-color 0.2s;
      animation: fadeUp 0.5s ease both;
    }
    .criterion-card:hover { border-color: var(--border-hover); }

    .crit-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .crit-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    .coeff-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: var(--surface);
    }
    .coeff-badge.x2 {
      color: var(--accent);
      background: var(--accent-dim);
      border-color: var(--accent-border);
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--surface);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.15); }
    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
    }

    .score-num {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Cinzel', serif;
      min-width: 30px;
      text-align: right;
      color: var(--text);
      transition: color 0.2s;
    }

    .pip-row {
      display: flex;
      gap: 3px;
      margin-top: 9px;
    }
    .pip {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--surface);
      transition: background 0.15s;
    }
    .pip.low   { background: var(--red); }
    .pip.mid   { background: var(--orange); }
    .pip.high  { background: var(--accent); }
    .pip.great { background: var(--green); }

    /* RESULT */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 1.75rem;
      animation: fadeUp 0.5s 0.4s ease both;
    }

    .result-main {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .big-score {
      font-family: 'Cinzel', serif;
      font-size: 64px;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
      transition: color 0.3s;
    }
    .big-denom {
      font-size: 22px;
      color: var(--text-muted);
      font-family: 'Cinzel', serif;
    }

    .verdict-badge {
      margin-left: auto;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: var(--surface);
      transition: all 0.3s;
    }

    .progress-bar-wrap {
      height: 6px;
      background: var(--surface);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1), background 0.3s;
      width: 0%;
    }

    .breakdown {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 8px;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .bk-item {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }
    .bk-item strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-top: 2px;
    }

    .formula-note {
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 1rem;
      font-style: italic;
      line-height: 1.6;
    }

    .reset-btn {
      display: block;
      margin: 1rem auto 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      transition: border-color 0.2s, color 0.2s;
    }
    .reset-btn:hover { border-color: var(--border-hover); color: var(--text); }

    /* BONUS CARD */
    .bonus-card {
      background: var(--card);
      border: 1px solid var(--accent-border);
      border-radius: 14px;
      padding: 16px 18px 14px;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.5s 0.38s ease both;
    }

    .bonus-pip {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--surface);
      transition: background 0.15s;
    }
    .bonus-pip.on { background: var(--green); }

    .bonus-score-num {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Cinzel', serif;
      min-width: 24px;
      text-align: right;
      color: var(--green);
    }

    .result-bonus-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 0.6rem;
      font-size: 12px;
      color: var(--text-muted);
    }
    .result-bonus-line .bonus-val {
      color: var(--green);
      font-weight: 700;
      font-size: 14px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">

  <header class="site-header">
    <p class="eyebrow">Évaluation</p>
    <h1>Notation<br>Manga & Anime</h1>
    <p class="subtitle">Six critères pondérés · Bonus · Score sur 100</p>
  </header>

  <div class="type-toggle">
    <button class="type-btn active" id="btn-manga" onclick="setType('manga')">Manga</button>
    <button class="type-btn" id="btn-anime" onclick="setType('anime')">Anime</button>
  </div>

  <div class="title-wrap">
    <label class="field-label" for="title-input">Titre</label>
    <input class="title-input" id="title-input" type="text" placeholder="Ex : Berserk, Vinland Saga, Demon Slayer…" />
  </div>

  <div class="criteria-grid" id="criteria-grid"></div>

  <!-- BONUS -->
  <div class="bonus-card">
    <div class="crit-top">
      <span class="crit-name">⭐ Bonus</span>
      <span class="coeff-badge x2">+ 0 à 5 pts</span>
    </div>
    <div class="slider-row">
      <input type="range" min="0" max="5" step="1" value="0" id="slider-bonus" oninput="onBonus(this.value)" />
      <span class="bonus-score-num" id="badge-bonus">0</span>
    </div>
    <div class="pip-row" id="pips-bonus">
      <div class="bonus-pip"></div>
      <div class="bonus-pip"></div>
      <div class="bonus-pip"></div>
      <div class="bonus-pip"></div>
      <div class="bonus-pip"></div>
    </div>
  </div>

  <div class="result-card">
    <div class="result-main">
      <span class="big-score" id="big-score">0</span>
      <span class="big-denom">/ 100</span>
      <span class="verdict-badge" id="verdict">—</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="prog-fill"></div>
    </div>
    <div class="result-bonus-line">
      <span>Score de base :</span>
      <span id="base-score-display" style="font-weight:700;color:var(--text)">0</span>
      <span style="margin-left:4px">+ Bonus :</span>
      <span class="bonus-val" id="bonus-display">+0</span>
    </div>
    <div class="breakdown" id="breakdown"></div>
    <p class="formula-note" id="formula-note">Entrez vos notes pour obtenir le score final.</p>
    <button class="reset-btn" onclick="resetAll()">↺ Réinitialiser</button>
  </div>

</div>

<script>
  let currentType = 'manga';
  const scores = {};
  let bonus = 0;

  const CRITERIA = {
    manga: [
      { id: 'perso',    label: 'Personnages',       coeff: 1 },
      { id: 'univers',  label: 'Univers',            coeff: 1 },
      { id: 'intrigue', label: 'Intrigue',           coeff: 1 },
      { id: 'visuel',   label: 'Dessin',             coeff: 1 },
      { id: 'emotions', label: 'Émotions',           coeff: 2 },
      { id: 'themes',   label: 'Messages & thèmes',  coeff: 1 },
    ],
    anime: [
      { id: 'perso',    label: 'Personnages',          coeff: 1 },
      { id: 'univers',  label: 'Univers',               coeff: 1 },
      { id: 'intrigue', label: 'Intrigue',              coeff: 1 },
      { id: 'visuel',   label: 'Animation & musique',   coeff: 1 },
      { id: 'emotions', label: 'Émotions',              coeff: 2 },
      { id: 'themes',   label: 'Messages & thèmes',     coeff: 1 },
    ]
  };

  function pipClass(val, max) {
    const ratio = val / max;
    if (ratio >= 0.85) return 'great';
    if (ratio >= 0.65) return 'high';
    if (ratio >= 0.35) return 'mid';
    return 'low';
  }

  function renderPips(val, max) {
    let h = '';
    const cls = pipClass(val, max);
    for (let i = 1; i <= max; i++) {
      h += `<div class="pip${i <= val ? ' ' + cls : ''}"></div>`;
    }
    return h;
  }

  function onBonus(val) {
    bonus = parseInt(val);
    document.getElementById('badge-bonus').textContent = val;
    const pips = document.querySelectorAll('#pips-bonus .bonus-pip');
    pips.forEach((p, i) => { p.classList.toggle('on', i < bonus); });
    updateResult();
  }

  function setType(type) {
    currentType = type;
    document.getElementById('btn-manga').classList.toggle('active', type === 'manga');
    document.getElementById('btn-anime').classList.toggle('active', type === 'anime');
    renderCriteria();
    updateResult();
  }

  function renderCriteria() {
    const grid = document.getElementById('criteria-grid');
    grid.innerHTML = '';
    CRITERIA[currentType].forEach((c, i) => {
      if (scores[c.id] === undefined) scores[c.id] = 0;
      const val = scores[c.id];
      const card = document.createElement('div');
      card.className = 'criterion-card';
      card.style.animationDelay = (i * 0.06) + 's';
      card.innerHTML = `
        <div class="crit-top">
          <span class="crit-name">${c.label}</span>
          <span class="coeff-badge${c.coeff === 2 ? ' x2' : ''}">× ${c.coeff}</span>
        </div>
        <div class="slider-row">
          <input type="range" min="0" max="20" step="1" value="${val}" id="slider-${c.id}"
            oninput="onSlide('${c.id}', this.value)" />
          <span class="score-num" id="badge-${c.id}">${val}</span>
        </div>
        <div class="pip-row" id="pips-${c.id}">${renderPips(val, 20)}</div>
      `;
      grid.appendChild(card);
    });
  }

  function onSlide(id, val) {
    scores[id] = parseInt(val);
    document.getElementById('badge-' + id).textContent = val;
    document.getElementById('pips-' + id).innerHTML = renderPips(parseInt(val), 20);
    updateResult();
  }

  function updateResult() {
    const criteria = CRITERIA[currentType];
    let weighted = 0, totalCoeff = 0;
    criteria.forEach(c => {
      weighted += (scores[c.id] || 0) * c.coeff;
      totalCoeff += c.coeff;
    });
    const maxW = 20 * totalCoeff;
    const baseScore = Math.round((weighted / maxW) * 100);
    const finalScore = Math.min(100, baseScore + bonus);

    document.getElementById('big-score').textContent = finalScore;
    document.getElementById('base-score-display').textContent = baseScore;
    document.getElementById('bonus-display').textContent = '+' + bonus;

    const fill = document.getElementById('prog-fill');
    fill.style.width = finalScore + '%';

    let verdict = '—', vStyle = '', fillColor = 'var(--accent)';
    if (weighted === 0 && bonus === 0) {
      verdict = '—'; vStyle = '';
    } else if (finalScore >= 90) {
      verdict = 'Chef-d\'œuvre'; vStyle = 'background:var(--green-dim);color:var(--green);border-color:rgba(92,184,138,0.3)'; fillColor = 'var(--green)';
    } else if (finalScore >= 75) {
      verdict = 'Excellent'; vStyle = 'background:var(--green-dim);color:var(--green);border-color:rgba(92,184,138,0.3)'; fillColor = 'var(--green)';
    } else if (finalScore >= 60) {
      verdict = 'Très bien'; vStyle = 'background:var(--blue-dim);color:var(--blue);border-color:rgba(106,170,232,0.3)'; fillColor = 'var(--blue)';
    } else if (finalScore >= 45) {
      verdict = 'Correct'; vStyle = 'background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border)'; fillColor = 'var(--accent)';
    } else if (finalScore >= 25) {
      verdict = 'Décevant'; vStyle = 'background:var(--orange-dim);color:var(--orange);border-color:rgba(224,147,92,0.3)'; fillColor = 'var(--orange)';
    } else {
      verdict = 'À éviter'; vStyle = 'background:var(--red-dim);color:var(--red);border-color:rgba(224,92,92,0.3)'; fillColor = 'var(--red)';
    }

    const vEl = document.getElementById('verdict');
    vEl.textContent = verdict;
    vEl.style.cssText = vStyle;
    fill.style.background = fillColor;

    document.getElementById('breakdown').innerHTML = criteria.map(c => {
      const pts = (scores[c.id] || 0) * c.coeff;
      const max = 20 * c.coeff;
      return `<div class="bk-item">${c.label}<strong>${pts} / ${max} pts</strong></div>`;
    }).join('');

    const coeffInfo = criteria.filter(c => c.coeff > 1).map(c => `${c.label} (×${c.coeff})`).join(', ');
    document.getElementById('formula-note').textContent =
      `Score = (somme pondérée / ${maxW}) × 100 + bonus (0–5) · Coefficient double : ${coeffInfo}`;
  }

  function resetAll() {
    Object.keys(scores).forEach(k => scores[k] = 0);
    bonus = 0;
    document.getElementById('title-input').value = '';
    document.getElementById('slider-bonus').value = 0;
    onBonus(0);
    renderCriteria();
    updateResult();
  }

  renderCriteria();
  updateResult();
</script>
</body>
</html>
